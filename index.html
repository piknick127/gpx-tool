<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GPX Tool v7.13｜Pikmin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#07140d;--panel:#06140b;--box:#0b2012;--line:#245d39;--text:#d8ffe0;--muted:#9bcda6}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC",sans-serif}
#app{min-height:100dvh;display:grid;grid-template-columns:33.333% 66.667%}
#left{background:var(--panel);border-right:1px solid var(--line);padding:12px;overflow:auto}
#map{height:100dvh;background:#111;position:sticky;top:0}
h1{font-size:16px;margin:0 0 10px;color:#7dff9a;letter-spacing:.08em}
h2{font-size:14px;margin:0 0 8px;color:#baf7c8}
.box{border:1px solid var(--line);border-radius:12px;background:var(--box);padding:10px;margin-bottom:10px}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}
input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:8px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0}
button{background:#136b32;border-color:#2ea44f;font-weight:800;cursor:pointer}
button.secondary{background:#17291d;border-color:#375b42}
button.danger{background:#5b1616;border-color:#9a2d2d}
button.active{background:#ffd400!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 12px #ffd400}
.row,.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;resize:vertical}
.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4;white-space:pre-wrap}
.crosshair{position:absolute;left:50%;top:50%;width:30px;height:30px;margin-left:-15px;margin-top:-15px;z-index:700;pointer-events:none}
.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}
.crosshair:before{left:14px;top:0;width:2px;height:30px}.crosshair:after{left:0;top:14px;width:30px;height:2px}
.marker-dot{width:24px;height:24px;border-radius:50%;background:#0d7d38;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}
.center-dot{width:26px;height:26px;border-radius:50%;background:#7c3aed;color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;box-shadow:0 0 12px #000}
.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}
details summary{cursor:pointer;color:#7dff9a;font-weight:700}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#14532d;color:#fff;padding:10px 18px;border-radius:999px;z-index:9999;opacity:0;transition:.2s}.toast.show{opacity:1}
.mobile-map-title{display:none}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#c7ffd4}
.swatch{display:inline-block;width:18px;height:4px;border-radius:4px;background:#ffd400}.swatch.pink{background:#ff4fd8}.swatch.purple{background:#a78bfa}
@media(max-width:900px){#app{display:flex;flex-direction:column;min-height:100dvh}#left{order:1;border-right:0;border-bottom:1px solid var(--line);overflow:visible}#map{order:2;height:65dvh;min-height:420px;position:relative;top:auto}.mobile-map-title{display:block;background:#06140b;border-top:1px solid var(--line);padding:10px 12px;color:#7dff9a;font-weight:800}}
@media(max-width:520px){#left{padding:10px}#map{height:58dvh;min-height:360px}.row,.output-grid{grid-template-columns:1fr}h1{font-size:15px}}
</style>
</head>
<body>
<div id="app">
<aside id="left">
<h1>GPX TOOL v7.13</h1>

<div class="box">
  <h2>地圖定位</h2>
  <label>地圖中心座標</label>
  <input id="centerInput" value="" placeholder="lat,lng">
  <button id="goBtn">前往座標</button>
</div>

<details class="box">
  <summary>截圖輔助圖層</summary>
  <label>載入截圖</label>
  <input id="fileInput" type="file" accept="image/*">
  <label>透明度</label>
  <input id="overlayOpacity" type="range" min="0.05" max="1" step="0.05" value="0.55">
  <div class="row"><button id="toggleOverlay" class="secondary">顯示/隱藏</button><button id="clearOverlay" class="danger">移除截圖</button></div>
  <div class="status" id="imgStatus">尚未載入截圖</div>
</details>

<div class="box">
  <h2>地圖標點</h2>
  <button id="addCenterBtn">十字中心加點</button>
  <div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="undoBtn" class="secondary">復原</button></div>
  <div class="row"><button id="clearBtn" class="danger">清除點位</button><button id="reverseBtn" class="secondary">反轉順序</button></div>
  <div class="status" id="pointStatus">點位 0｜尚未標點</div>
</div>

<div class="box">
  <h2>路徑生成</h2>
  <label>輸入座標</label>
  <textarea id="genCoords" rows="7" placeholder="可貼上文字與座標，系統只擷取有效座標"></textarea>
  <button id="cleanCoordsBtn" class="secondary">清洗座標文字</button>
  <div class="status" id="parseStatus">尚未解析座標</div>

  <label>生成模式</label>
  <select id="genMode">
    <option value="flower5">種一圈（五邊）</option>
    <option value="flower8">種一圈（八邊）</option>
    <option value="patch">補開花</option>
    <option value="flower2">種兩圈(五邊 → 開花）</option>
  </select>

  <label>路徑生成排序</label>
  <select id="sortMode">
    <option value="optimized">路徑最佳化</option>
    <option value="manual">依輸入順序</option>
    <option value="shapeCenter">回圖形中心</option>
  </select>
</div>

<div class="box">
  <h2>參數</h2>
  <label>種花半徑</label>
  <select id="flowerRadius"><option value="30">30m</option><option value="25">25m</option><option value="20">20m</option></select>
  <div class="status">採收半徑 30m</div>
</div>

<div class="box">
  <h2>GPX 輸出</h2>
  <label>檔名</label>
  <input id="fileName" value="pikmin_route">
  <div class="output-grid">
    <button id="generatePreviewBtn">生成預覽途徑</button>
    <button id="copyOutputBtn" class="secondary">複製輸出座標</button>
    <button id="downloadFlowerBtn">種花路徑</button>
    <button id="downloadFruitBtn" class="secondary">採收路徑</button>
  </div>
  <div class="legend"><span><i class="swatch"></i>第一圈</span><span><i class="swatch pink"></i>第二圈</span><span><i class="swatch purple"></i>圖形中心</span></div>
  <div class="status" id="genStatus">尚未生成</div>
  <label>輸出座標</label>
  <textarea id="routeList" rows="8" readonly></textarea>
</div>
</aside>

<div class="mobile-map-title">地圖預覽</div>
<main id="map"><div class="crosshair"></div></main>
</div>
<div id="toast" class="toast"></div>

<script>
const $=id=>document.getElementById(id);
const defaultCenter=L.latLng(37.196446,36.577787);
let points=[],markers=[],baseLine=null,routeLine=null,routeLine2=null,centerMarker=null,generatedPts=[],secondLapStart=-1,clickAdd=false;
let overlay=null,overlayVisible=true;

function fmt(n,d=7){return Number(n).toFixed(d)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
function parseCoord(s){
  const a=String(s).trim().split(/[,\s]+/).filter(Boolean).map(Number);
  if(a.length<2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');
  return L.latLng(a[0],a[1]);
}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1400)}
async function copyText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){await navigator.clipboard.writeText(text)}
    else{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');ta.remove()}
    toast('已複製');
  }catch(e){alert('複製失敗，請手動選取文字')}
}

const init=$('centerInput').value.trim()?parseCoord($('centerInput').value):defaultCenter;
const map=L.map('map',{zoomControl:true}).setView(init,17);
const layers={
  'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),
  'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),
  'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})
};
layers['OSM Standard'].addTo(map);
L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);

function icon(i){return L.divIcon({className:'',html:`<div class="marker-dot">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function centerIcon(){return L.divIcon({className:'',html:`<div class="center-dot">中</div>`,iconSize:[26,26],iconAnchor:[13,13]})}
function syncInput(){ $('genCoords').value=points.map(p=>`${fmt(p.lat)},${fmt(p.lng)}`).join('\n'); parseInputCoords(); }
function refresh(){
  markers.forEach(m=>m.remove());markers=[];
  if(baseLine)baseLine.remove();
  points.forEach((p,i)=>{
    const m=L.marker([p.lat,p.lng],{icon:icon(i+1),draggable:true}).addTo(map);
    m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;syncInput();refresh()});
    m.on('contextmenu',()=>{points.splice(i,1);syncInput();refresh()});
    markers.push(m);
  });
  if(points.length>1)baseLine=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.8}).addTo(map);
  $('pointStatus').textContent=`點位 ${points.length}｜${clickAdd?'標點中':'尚未標點'}`;
}

$('goBtn').onclick=()=>{try{const v=$('centerInput').value.trim();if(!v){alert('請輸入座標');return}map.setView(parseCoord(v),17)}catch(e){alert(e.message)}};
$('addCenterBtn').onclick=()=>{const c=map.getCenter();points.push({lat:c.lat,lng:c.lng});syncInput();refresh()};
$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('toggleClickBtn').classList.toggle('active',clickAdd);refresh()};
map.on('click',e=>{if(clickAdd){points.push({lat:e.latlng.lat,lng:e.latlng.lng});syncInput();refresh()}});
$('undoBtn').onclick=()=>{points.pop();syncInput();refresh()};
$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];generatedPts=[];syncInput();refresh();drawGenerated([]);$('routeList').value='';$('genStatus').textContent='尚未生成'}};
$('reverseBtn').onclick=()=>{points.reverse();syncInput();refresh()};

function placeOverlay(url){
  const c=map.getCenter(),d=0.001,b=[[c.lat-d,c.lng-d],[c.lat+d,c.lng+d]];
  if(overlay)overlay.remove();
  overlay=L.imageOverlay(url,b,{opacity:Number($('overlayOpacity').value)}).addTo(map);
  map.fitBounds(b); $('imgStatus').textContent='已載入截圖';
}
$('fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>placeOverlay(ev.target.result);r.readAsDataURL(f)};
$('overlayOpacity').oninput=()=>{if(overlay)overlay.setOpacity(Number($('overlayOpacity').value))};
$('toggleOverlay').onclick=()=>{if(!overlay)return;overlayVisible=!overlayVisible;overlay.setOpacity(overlayVisible?Number($('overlayOpacity').value):0)};
$('clearOverlay').onclick=()=>{if(overlay)overlay.remove();overlay=null;$('imgStatus').textContent='尚未載入截圖'};

function toRad(d){return d*Math.PI/180}
function dist(a,b){
  const R=6371000,dp=toRad(b.lat-a.lat),dl=toRad(b.lng-a.lng),p1=toRad(a.lat),p2=toRad(b.lat);
  const h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
}
function destination(p,m,bearingDeg){
  const R=6378137,br=toRad(bearingDeg),lat1=toRad(p.lat),lon1=toRad(p.lng),d=m/R;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));
  const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return {lat:lat2*180/Math.PI,lng:lon2*180/Math.PI};
}
function bearing(a,b){
  const y=Math.sin(toRad(b.lng-a.lng))*Math.cos(toRad(b.lat));
  const x=Math.cos(toRad(a.lat))*Math.sin(toRad(b.lat))-Math.sin(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.cos(toRad(b.lng-a.lng));
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function parseInputCoords(){
  const text=$('genCoords').value||'', out=[], seen=new Set();
  let ignored=0, dup=0;
  for(const raw of text.split(/\n+/)){
    const line=raw.trim();
    if(!line)continue;
    const pairs=[...line.matchAll(/(-?\d{1,3}\.\d+)\s*[,，;|/\s]+\s*(-?\d{1,3}\.\d+)/g)];
    if(!pairs.length){ignored++;continue}
    for(const m of pairs){
      let lat=Number(m[1]),lng=Number(m[2]);
      if((lat<-90||lat>90)&&(lng>=-90&&lng<=90)&&(lat>=-180&&lat<=180)){const t=lat;lat=lng;lng=t}
      if(lat<-90||lat>90||lng<-180||lng>180)continue;
      const key=`${lat.toFixed(7)},${lng.toFixed(7)}`;
      if(seen.has(key)){dup++;continue}
      seen.add(key);out.push({lat,lng});
    }
  }
  $('parseStatus').textContent=`已識別 ${out.length} 組座標`+(dup?`｜移除重複 ${dup} 組`:'')+(ignored?`｜忽略 ${ignored} 行`:'');
  return out;
}
function cleanCoordText(){
  const coords=parseInputCoords();
  if(!coords.length){alert('沒有識別到有效座標');return}
  $('genCoords').value=coords.map(p=>`${fmt(p.lat)},${fmt(p.lng)}`).join('\n');
  parseInputCoords(); toast('已清洗座標');
}
function routeLen(a){let s=0;for(let i=1;i<a.length;i++)s+=dist(a[i-1],a[i]);return s}
function shapeCenter(centers){return centers.length?{lat:centers.reduce((s,p)=>s+p.lat,0)/centers.length,lng:centers.reduce((s,p)=>s+p.lng,0)/centers.length}:null}
function polygonPts(center,sides,r,startAngle){
  const pts=[]; for(let i=0;i<sides;i++)pts.push(destination(center,r,startAngle+i*360/sides));
  pts.push(destination(center,r,startAngle)); return pts;
}
function patchPts(center,r,startAngle){return [0,60,120,180].map(a=>destination(center,r,startAngle+a))}
function routeFromCenters(centers){
  secondLapStart=-1;
  const r=Number($('flowerRadius').value)||30, mode=$('genMode').value, pts=[];
  if(mode==='flower2'){
    const first=[],second=[];
    for(let i=0;i<centers.length;i++){const c=centers[i],n=centers[i+1]||centers[0]||c;first.push(...polygonPts(c,5,r,centers.length>1?bearing(c,n):0))}
    const start=first[0]||centers[0]; first.push(start);
    for(let i=0;i<centers.length;i++){const c=centers[i],n=centers[i+1]||centers[0]||c;second.push(...patchPts(c,r,centers.length>1?bearing(c,n):0))}
    pts.push(...first); secondLapStart=pts.length-1; pts.push(...second);
  }else{
    for(let i=0;i<centers.length;i++){
      const c=centers[i],n=centers[i+1]||centers[0]||c,ang=centers.length>1?bearing(c,n):0;
      if(mode==='flower5')pts.push(...polygonPts(c,5,r,ang));
      else if(mode==='flower8')pts.push(...polygonPts(c,8,r,ang));
      else pts.push(...patchPts(c,r,ang));
    }
  }
  return pts;
}
function nearestCenters(arr){
  if(arr.length<=2)return arr.slice();
  let best=null;
  for(let s=0;s<arr.length;s++){
    const rem=arr.slice(),out=[rem.splice(s,1)[0]];
    while(rem.length){const cur=out[out.length-1];let bi=0,bd=Infinity;rem.forEach((p,i)=>{const d=dist(cur,p);if(d<bd){bd=d;bi=i}});out.push(rem.splice(bi,1)[0])}
    const len=routeLen(routeFromCenters(out)); if(!best||len<best.len)best={arr:out,len};
  }
  return best.arr;
}
function optimizeCenters(centers){
  if(centers.length<=2)return centers.slice();
  let best=nearestCenters(centers), bestCost=routeLen(routeFromCenters(best)), improved=true, guard=0;
  while(improved&&guard++<30){
    improved=false;
    for(let i=1;i<best.length-2;i++){
      for(let k=i+1;k<best.length-1;k++){
        const n=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));
        const c=routeLen(routeFromCenters(n));
        if(c+0.01<bestCost){best=n;bestCost=c;improved=true}
      }
    }
  }
  return best;
}
function orderedCenters(centers){
  if($('sortMode').value==='manual')return centers.slice();
  return optimizeCenters(centers);
}
function buildFlowerRoute(){
  const raw=parseInputCoords(), centers=orderedCenters(raw);
  if(!centers.length)return [];
  const pts=routeFromCenters(centers);
  if($('sortMode').value==='shapeCenter'){const c=shapeCenter(raw);if(c)pts.push(c)}
  return pts;
}
function pointToSegmentMeters(p,a,b){
  const lat0=toRad(p.lat), mx=111320*Math.cos(lat0), my=110540;
  const ax=(a.lng-p.lng)*mx, ay=(a.lat-p.lat)*my;
  const bx=(b.lng-p.lng)*mx, by=(b.lat-p.lat)*my;
  const vx=bx-ax, vy=by-ay;
  const len2=vx*vx+vy*vy;
  if(len2===0)return Math.sqrt(ax*ax+ay*ay);
  let t=-(ax*vx+ay*vy)/len2;
  t=Math.max(0,Math.min(1,t));
  const x=ax+t*vx, y=ay+t*vy;
  return Math.sqrt(x*x+y*y);
}
function pointInCircle(p,c,r){return dist(p,c)<=r+0.5}
function segmentHitsCircle(a,b,c,r){return pointToSegmentMeters(c,a,b)<=r+0.5}
function closestPointOnHarvestCircle(from,c,r){
  if(pointInCircle(from,c,r))return {lat:from.lat,lng:from.lng};
  return destination(c,r,bearing(c,from));
}
function edgePointToward(c,toward,r){
  return destination(c,r,bearing(c,toward));
}
function markHarvestCovered(uncovered,centers,prev,cur,r){
  for(const idx of Array.from(uncovered)){
    const c=centers[idx];
    if(pointInCircle(cur,c,r)||(prev&&segmentHitsCircle(prev,cur,c,r))){
      uncovered.delete(idx);
    }
  }
}
function buildHarvestManual(centers){
  const R=30;
  secondLapStart=-1;
  if(!centers.length)return [];
  if(centers.length===1)return [{lat:centers[0].lat,lng:centers[0].lng}];

  const route=[];
  let cur=edgePointToward(centers[0],centers[1],R);
  route.push(cur);

  for(let i=1;i<centers.length;i++){
    if(pointInCircle(cur,centers[i],R))continue;
    const p=closestPointOnHarvestCircle(cur,centers[i],R);
    if(dist(cur,p)>0.5){route.push(p);cur=p}
  }
  return route;
}
function buildHarvestFromStart(centers,startIdx){
  const R=30;
  if(centers.length===1)return [{lat:centers[0].lat,lng:centers[0].lng}];

  const uncovered=new Set(centers.map((_,i)=>i));
  const start=centers[startIdx];

  let nextIdx=-1,nextD=Infinity;
  for(let i=0;i<centers.length;i++){
    if(i===startIdx)continue;
    const d=Math.max(0,dist(start,centers[i])-R*2);
    if(d<nextD){nextD=d;nextIdx=i}
  }

  let cur=nextIdx>=0?edgePointToward(start,centers[nextIdx],R):{lat:start.lat,lng:start.lng};
  const route=[cur];
  markHarvestCovered(uncovered,centers,null,cur,R);

  let guard=0;
  while(uncovered.size&&guard++<centers.length*3+20){
    let bestIdx=-1,bestMove=Infinity,bestPoint=null;

    for(const idx of uncovered){
      const c=centers[idx];
      const p=closestPointOnHarvestCircle(cur,c,R);
      const move=dist(cur,p);
      if(move<bestMove){
        bestMove=move;
        bestIdx=idx;
        bestPoint=p;
      }
    }

    if(bestIdx<0)break;

    const prev=cur;
    cur=bestPoint;

    if(dist(prev,cur)>0.5){
      route.push(cur);
    }else{
      uncovered.delete(bestIdx);
    }

    markHarvestCovered(uncovered,centers,prev,cur,R);
  }

  return route;
}
function buildHarvestOptimized(centers){
  secondLapStart=-1;
  if(!centers.length)return [];
  if(centers.length===1)return [{lat:centers[0].lat,lng:centers[0].lng}];

  const seedOrder=nearestCenters(centers);
  const maxStarts=centers.length>40?20:centers.length;
  const starts=[];

  for(let i=0;i<Math.min(maxStarts,seedOrder.length);i++){
    const idx=centers.findIndex(p=>Math.abs(p.lat-seedOrder[i].lat)<1e-10&&Math.abs(p.lng-seedOrder[i].lng)<1e-10);
    if(idx>=0&&!starts.includes(idx))starts.push(idx);
  }
  if(!starts.includes(0))starts.push(0);

  let best=null,bestLen=Infinity;
  for(const s of starts){
    const route=buildHarvestFromStart(centers,s);
    const len=routeLen(route);
    if(route.length&&len<bestLen){best=route;bestLen=len}
  }
  return best||buildHarvestManual(centers);
}
function buildFruitRoute(){
  const raw=parseInputCoords();
  let pts;
  if($('sortMode').value==='manual'){
    pts=buildHarvestManual(raw);
  }else{
    pts=buildHarvestOptimized(raw);
  }

  if($('sortMode').value==='shapeCenter'){
    const c=shapeCenter(raw);
    if(c)pts.push(c);
  }

  secondLapStart=-1;
  return pts;
}
function drawGenerated(pts){
  if(routeLine)routeLine.remove(); if(routeLine2)routeLine2.remove(); if(centerMarker)centerMarker.remove();
  routeLine=routeLine2=centerMarker=null;
  if(!pts.length)return;
  if(secondLapStart>=0&&secondLapStart<pts.length-1){
    const first=pts.slice(0,secondLapStart+1), second=pts.slice(secondLapStart);
    if(first.length>1)routeLine=L.polyline(first.map(p=>[p.lat,p.lng]),{color:'#ffd400',weight:3,opacity:.95,dashArray:'8,6'}).addTo(map);
    if(second.length>1)routeLine2=L.polyline(second.map(p=>[p.lat,p.lng]),{color:'#ff4fd8',weight:4,opacity:.98,dashArray:'4,8'}).addTo(map);
  }else if(pts.length>1){
    routeLine=L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#ffd400',weight:3,opacity:.95,dashArray:'8,6'}).addTo(map);
  }
  if($('sortMode').value==='shapeCenter'){const c=shapeCenter(parseInputCoords());if(c)centerMarker=L.marker([c.lat,c.lng],{icon:centerIcon()}).addTo(map)}
}
function outputRoute(pts){
  generatedPts=pts; $('routeList').value=pts.map(p=>`${fmt(p.lat)},${fmt(p.lng)}`).join('\n');
  drawGenerated(pts);
  const meters=Math.round(routeLen(pts));
  $('genStatus').textContent=`輸入 ${parseInputCoords().length} 點｜輸出 ${pts.length} 點｜距離 ${meters>=1000?(meters/1000).toFixed(2)+'km':meters+'m'}`;
}
function buildGpx(pts,name){
  let s=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX Tool v7.13" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${esc(name)}</name></metadata>\n`;
  pts.forEach((p,i)=>{s+=`<wpt lat="${fmt(p.lat)}" lon="${fmt(p.lng)}"><name>P${i+1}</name></wpt>\n`});
  return s+'</gpx>\n';
}
function downloadRoute(kind){
  const pts=kind==='flower'?buildFlowerRoute():buildFruitRoute();
  if(!pts.length){alert('請先輸入或標記座標');return}
  outputRoute(pts);
  let base=($('fileName').value||'pikmin_route').replace(/[\\/:*?"<>|]/g,'_');
  base+=kind==='flower'?'_種花路徑':'_採收路徑';
  const blob=new Blob([buildGpx(pts,base)],{type:'application/gpx+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=base+'.gpx'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1200); toast('已下載 GPX');
}

$('cleanCoordsBtn').onclick=cleanCoordText;
$('genCoords').addEventListener('input',parseInputCoords);
$('generatePreviewBtn').onclick=()=>{try{const pts=buildFlowerRoute();if(!pts.length){alert('請先輸入或標記座標');return}outputRoute(pts)}catch(e){console.error(e);alert('生成路徑時發生錯誤：'+e.message)}};
$('copyOutputBtn').onclick=()=>copyText($('routeList').value);
$('downloadFlowerBtn').onclick=()=>{try{downloadRoute('flower')}catch(e){console.error(e);alert('下載種花路徑時發生錯誤：'+e.message)}};
$('downloadFruitBtn').onclick=()=>{try{downloadRoute('fruit')}catch(e){console.error(e);alert('下載採收路徑時發生錯誤：'+e.message)}};

refresh();
parseInputCoords();
</script>
