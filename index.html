<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GPX Tool v7｜Pikmin 種花最佳化</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#07140d;--panel:#06140b;--box:#0b2012;--line:#245d39;--txt:#d8ffe0;--muted:#9bcda6;--ok:#7ee787;--warn:#ffd166;--bad:#ff9b9b;--accent:#7dff9a;--blue:#69a7ff}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
#app{height:100%;display:grid;grid-template-columns:420px 1fr}#left{background:var(--panel);border-right:1px solid var(--line);overflow:auto;padding:12px}.topbar{display:flex;gap:8px;margin-bottom:10px;position:sticky;top:0;background:var(--panel);z-index:10;padding-bottom:8px}.tab{flex:1;border:1px solid #2e6b43;background:#17291d;color:var(--txt);border-radius:999px;padding:10px;font-weight:900}.tab.active{background:var(--accent);color:#07140d}.view{display:none}.view.active{display:block}
#map{height:100%;background:#111}.box{border:1px solid var(--line);background:var(--box);border-radius:14px;padding:10px;margin-bottom:10px}h1{font-size:16px;margin:0 0 10px;color:var(--accent);letter-spacing:.06em}h2{font-size:14px;margin:0 0 8px;color:#dfffe6}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:9px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0;font-size:14px}textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;min-height:110px;resize:vertical}button{background:#136b32;border-color:#2ea44f;font-weight:900;cursor:pointer}.secondary{background:#17291d;border-color:#375b42}.danger{background:#5b1616;border-color:#9a2d2d}.activeBtn{background:#ffd400!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 12px #ffd400}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:9px;padding:8px;margin-top:8px;color:#c7ffd4}.warn{color:#ffe2a0;background:#251906;border-color:#a86b19}.bad{color:#ffc0c0;background:#2a0b0b;border-color:#9a2d2d}.small{font-size:12px;color:var(--muted);line-height:1.45}.drop{border:2px dashed #2e6b43;text-align:center;padding:12px;border-radius:10px;background:#07140d;color:var(--muted)}
.crosspad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:center}.crosspad button{min-height:40px}.crosshair{position:absolute;left:50%;top:50%;width:30px;height:30px;margin-left:-15px;margin-top:-15px;z-index:700;pointer-events:none}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}.crosshair:before{left:14px;top:0;width:2px;height:30px}.crosshair:after{left:0;top:14px;width:30px;height:2px}.overlay-img{position:absolute;transform-origin:center center;pointer-events:none;z-index:350;will-change:transform,opacity}.marker-dot{width:24px;height:24px;border-radius:50%;background:#0d7d38;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;box-shadow:0 0 10px #000}.selected-dot{background:#ffd400!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 14px #ffd400!important}.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}
canvas{width:100%;height:260px;background:#071225;border:1px solid #2e6b43;border-radius:12px}.pillrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{font-size:12px;border:1px solid #2e6b43;background:#07140d;border-radius:999px;padding:6px 10px;color:#d8ffe0}.list{max-height:180px;overflow:auto;white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#07140d;border:1px solid #2e6b43;border-radius:9px;padding:8px;margin-top:8px}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#1b5e20;color:#fff;border-radius:999px;padding:10px 18px;opacity:0;transition:.25s;z-index:9999}.toast.show{opacity:1}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:54% 46%}#left{order:2;border-right:0;border-top:1px solid var(--line)}#map{order:1}.topbar{position:static}}
</style>
</head>
<body>
<div id="app">
<aside id="left">
<h1>GPX TOOL v7｜Pikmin 種花最佳化</h1>
<div class="topbar"><button class="tab active" data-tab="mapTab">地圖標點</button><button class="tab" data-tab="genTab">路徑生成</button></div>

<section id="mapTab" class="view active">
<div class="box"><h2>地圖定位</h2><label>中心座標</label><input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng"><button id="goBtn">前往座標</button></div>
<div class="box"><h2>截圖 Overlay</h2><input id="fileInput" type="file" accept="image/*"><div id="drop" class="drop">拖放圖片 / 複製截圖後貼上</div><label>透明度</label><input id="opacity" type="range" min="0.05" max="1" step="0.05" value="0.55"><div class="row"><button id="toggleOverlay" class="secondary">顯示/隱藏</button><button id="clearOverlay" class="danger">移除截圖</button></div><div class="status" id="imgStatus">尚未載入截圖</div></div>
<div class="box"><h2>Overlay 精準校正</h2><div class="crosspad"><div></div><button onclick="moveOverlay(0,1)">↑</button><div></div><button onclick="moveOverlay(-1,0)">←</button><button id="resetOverlay" class="secondary">置中</button><button onclick="moveOverlay(1,0)">→</button><div></div><button onclick="moveOverlay(0,-1)">↓</button><div></div></div><label>平移步距 / 公尺</label><select id="moveStep"><option value="0.25">0.25m</option><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option><option value="10">10m</option></select><div class="row"><button onclick="scaleOverlay(1.01)">放大1%</button><button onclick="scaleOverlay(0.99)">縮小1%</button></div><div class="row"><button onclick="rotateOverlay(-0.2)">左轉0.2°</button><button onclick="rotateOverlay(0.2)">右轉0.2°</button></div><div class="row"><button id="applyPikminPreset" class="secondary">套用 Pikmin 模板</button><button id="saveOverlayPreset" class="secondary">儲存校準</button></div><button id="loadOverlayPreset" class="secondary">載入校準</button><div class="status" id="overlayStatus">中心：--｜縮放：1.000｜旋轉：0°</div></div>
<div class="box"><h2>標點</h2><button id="addCenterBtn">十字中心加點</button><div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="undoBtn" class="secondary">復原</button></div><div class="row"><button id="clearBtn" class="danger">清除點位</button><button id="reverseBtn" class="secondary">反轉順序</button></div><div class="status" id="pointStatus">點位 0｜尚未標點</div></div>
<div class="box"><h2>局部補正</h2><div class="crosspad"><div></div><button onclick="offsetSelectedOrAll(0,1)">↑</button><div></div><button onclick="offsetSelectedOrAll(-1,0)">←</button><button id="toggleOffsetMode" class="secondary">全點補正</button><button onclick="offsetSelectedOrAll(1,0)">→</button><div></div><button onclick="offsetSelectedOrAll(0,-1)">↓</button><div></div></div><label>補正步距 / 公尺</label><select id="pointOffsetStep"><option value="0.25">0.25m</option><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option></select><div class="status" id="selectedStatus">目前選取：無</div></div>
<div class="box"><h2>座標輸出</h2><div class="row"><button id="copyCoordsBtn" class="secondary">複製座標</button><button id="sendToGenBtn">送到生成器</button></div><textarea id="coordsOut" rows="8" readonly></textarea></div>
</section>

<section id="genTab" class="view">
<div class="box"><h2>輸入座標</h2><textarea id="genCoords" placeholder="每行一組：lat,lng"></textarea><div class="row"><button id="pasteMapBtn" class="secondary">載入地圖點位</button><button id="copyGenCoordsBtn" class="secondary">複製輸入座標</button></div></div>
<div class="box"><h2>生成模式</h2><label>模式</label><select id="genMode"><option value="flower">種花繞圈</option><option value="scan">東西向掃描線</option><option value="fruit">收果實最短</option></select><div class="row"><div><label>排序</label><select id="sortMode"><option value="auto">自動排序</option><option value="manual">依貼上順序</option></select></div><div><label>方向</label><select id="direction"><option value="forward">順向</option><option value="reverse">反向</option></select></div></div><label>終點</label><select id="endMode"><option value="centroid">走到幾何中心</option><option value="last">停在最後座標</option><option value="start">走回第一點</option></select></div>
<div class="box"><h2>種花參數</h2><div class="row3"><div><label>繞圈半徑/m</label><input id="outerR" type="number" value="30"></div><div><label>繞圈數</label><input id="laps" type="number" value="1.0" step="0.05"></div><div><label>緩衝/m</label><input id="bufferM" type="number" value="90"></div></div><div class="row3"><div><label>每圈點數</label><input id="stepsLap" type="number" value="8"></div><div><label>速度 km/h</label><input id="speedKmh" type="number" value="12"></div><div><label>掃描線距/m</label><input id="scanSpacing" type="number" value="32"></div></div><div class="row"><div><label>掃描外擴/m</label><input id="scanMargin" type="number" value="45"></div><div><label>重複刪除</label><select id="dedupe"><option value="yes">啟用</option><option value="no">停用</option></select></div></div></div>
<div class="box"><h2>GPX 輸出</h2><label>檔名</label><input id="fileName" value="pikmin_route"><label>格式</label><select id="outFormat"><option value="standard">標準 Waypoint GPX</option><option value="itools">iTools GPX</option><option value="anyto">AnyTo GPX</option></select><div class="row"><button id="generateBtn">生成</button><button id="downloadBtn" class="secondary">下載 GPX</button></div><div class="row"><button id="copyGpxBtn" class="secondary">複製 GPX</button><button id="copyRouteBtn" class="secondary">複製輸出座標</button></div><div class="pillrow"><span class="pill" id="statIn">輸入 0</span><span class="pill" id="statOut">輸出 0</span><span class="pill" id="statDist">距離 0m</span><span class="pill" id="statTime">時間 0分</span></div><div id="warnBox" class="status" style="display:none"></div></div>
<div class="box"><h2>預覽</h2><canvas id="preview" width="900" height="420"></canvas><div class="list" id="routeList">尚未生成</div><textarea id="gpxOut" rows="8" readonly></textarea></div>
</section>
</aside>
<main id="map"><div class="crosshair"></div></main>
</div><div id="toast" class="toast"></div>
<script>
const $=id=>document.getElementById(id);
const R=6378137, RAD=Math.PI/180;
let points=[],markers=[],line=null,clickAdd=false,selectedIndex=-1,offsetAllMode=true;
let overlayEl=null,overlayCenter=null,overlayScale=1,overlayRot=0,overlayVisible=true,imgW=0,imgH=0;
let latest={pts:[],gpx:'',centers:[],dist:0,warnings:[]};
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600)}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('已複製')}catch(e){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();let ok=false;try{ok=document.execCommand('copy')}catch(_){ok=false}ta.remove();toast(ok?'已複製':'複製失敗，請手動全選')}}
function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1])}
function fmt(n,d=6){return Number(n).toFixed(d)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
const init=parseCoord($('centerInput').value);const map=L.map('map',{zoomControl:true}).setView(init,17);const layers={'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})};layers['OSM Standard'].addTo(map);L.control.layers(layers,null,{collapsed:true,position:'topright'}).addTo(map);const overlayPane=map.createPane('precisionOverlay');overlayPane.style.zIndex=350;overlayPane.style.pointerEvents='none';
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active');setTimeout(()=>map.invalidateSize(),50)});
function destination(latlng,meters,bearingDeg){const br=bearingDeg*RAD,lat1=latlng.lat*RAD,lon1=latlng.lng*RAD,d=meters/R;const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));return L.latLng(lat2/RAD,lon2/RAD)}
function hav(a,b){const p1=a.lat*RAD,p2=b.lat*RAD,dp=(b.lat-a.lat)*RAD,dl=((b.lng??b.lon)-(a.lng??a.lon))*RAD;const A=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*6371000*Math.atan2(Math.sqrt(A),Math.sqrt(1-A))}
function brg(a,b){const lonA=(a.lng??a.lon),lonB=(b.lng??b.lon);const y=Math.sin((lonB-lonA)*RAD)*Math.cos(b.lat*RAD),x=Math.cos(a.lat*RAD)*Math.sin(b.lat*RAD)-Math.sin(a.lat*RAD)*Math.cos(b.lat*RAD)*Math.cos((lonB-lonA)*RAD);return(Math.atan2(y,x)/RAD+360)%360}
function updateOverlay(){if(!overlayEl||!overlayCenter)return;const p=map.latLngToLayerPoint(overlayCenter),s=.65*overlayScale;overlayEl.style.left=(p.x-imgW*s/2)+'px';overlayEl.style.top=(p.y-imgH*s/2)+'px';overlayEl.style.width=(imgW*s)+'px';overlayEl.style.height=(imgH*s)+'px';overlayEl.style.opacity=overlayVisible?$('opacity').value:0;overlayEl.style.transform=`rotate(${overlayRot}deg)`;$('overlayStatus').textContent=`中心：${fmt(overlayCenter.lat)},${fmt(overlayCenter.lng)}｜縮放：${overlayScale.toFixed(3)}｜旋轉：${overlayRot.toFixed(1)}°`}
function createOverlay(url,w,h){if(overlayEl)overlayEl.remove();imgW=w;imgH=h;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;overlayVisible=true;overlayEl=document.createElement('img');overlayEl.src=url;overlayEl.className='overlay-img';overlayPane.appendChild(overlayEl);updateOverlay();$('imgStatus').textContent=`已載入截圖 ${w}×${h}`}
function loadFile(file){if(!file||!file.type.startsWith('image/')){alert('請提供圖片');return}const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>createOverlay(e.target.result,img.width,img.height);img.src=e.target.result};r.readAsDataURL(file)}
$('fileInput').onchange=e=>loadFile(e.target.files[0]);$('drop').ondragover=e=>e.preventDefault();$('drop').ondrop=e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])};document.addEventListener('paste',e=>{for(const it of e.clipboardData.items){if(it.type.startsWith('image/')){loadFile(it.getAsFile());e.preventDefault();return}}});$('opacity').oninput=updateOverlay;$('toggleOverlay').onclick=()=>{overlayVisible=!overlayVisible;updateOverlay()};$('clearOverlay').onclick=()=>{if(overlayEl)overlayEl.remove();overlayEl=null;overlayCenter=null;$('imgStatus').textContent='尚未載入截圖';$('overlayStatus').textContent='中心：--｜縮放：1.000｜旋轉：0°'};$('resetOverlay').onclick=()=>{if(!overlayEl)return;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;updateOverlay()};
function moveOverlay(x,y){if(!overlayCenter)return;const step=Number($('moveStep').value)||1;if(y>0)overlayCenter=destination(overlayCenter,step,0);if(y<0)overlayCenter=destination(overlayCenter,step,180);if(x>0)overlayCenter=destination(overlayCenter,step,90);if(x<0)overlayCenter=destination(overlayCenter,step,270);updateOverlay()}function scaleOverlay(f){if(!overlayEl)return;overlayScale*=f;updateOverlay()}function rotateOverlay(d){if(!overlayEl)return;overlayRot+=d;updateOverlay()}map.on('zoom move viewreset',updateOverlay);
$('applyPikminPreset').onclick=()=>{if(!overlayEl||!overlayCenter){alert('請先載入截圖');return}overlayRot=-1.25;overlayScale*=1.0042;overlayCenter=destination(destination(overlayCenter,5.8,90),4.2,0);updateOverlay()};$('saveOverlayPreset').onclick=()=>{if(!overlayCenter){alert('請先載入截圖');return}localStorage.setItem('v7Overlay',JSON.stringify({lat:overlayCenter.lat,lng:overlayCenter.lng,scale:overlayScale,rot:overlayRot,opacity:$('opacity').value}));toast('已儲存校準')};$('loadOverlayPreset').onclick=()=>{const raw=localStorage.getItem('v7Overlay');if(!raw||!overlayEl){alert('請先載入截圖，或尚無儲存校準');return}const p=JSON.parse(raw);overlayCenter=L.latLng(p.lat,p.lng);overlayScale=p.scale;overlayRot=p.rot;$('opacity').value=p.opacity||$('opacity').value;updateOverlay()};
function icon(i,sel=false){return L.divIcon({className:'',html:`<div class="marker-dot ${sel?'selected-dot':''}">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function refresh(){markers.forEach(m=>m.remove());markers=[];if(line)line.remove();points.forEach((p,i)=>{const m=L.marker([p.lat,p.lng],{icon:icon(i+1,i===selectedIndex),draggable:true}).addTo(map);m.on('click',()=>{selectedIndex=selectedIndex===i?-1:i;refresh()});m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});m.on('contextmenu',()=>{points.splice(i,1);if(selectedIndex===i)selectedIndex=-1;refresh()});markers.push(m)});if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.85}).addTo(map);$('pointStatus').textContent=`點位 ${points.length}｜${clickAdd?'標點中':'尚未標點'}`;$('selectedStatus').textContent=`目前選取：${selectedIndex>=0?selectedIndex+1:'無'}｜${offsetAllMode?'全點補正':'單點補正'}`;$('coordsOut').value=points.map(p=>`${fmt(p.lat)},${fmt(p.lng)}`).join('\n')}
function addPoint(ll){points.push({lat:ll.lat,lng:ll.lng});refresh()}$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),17)}catch(e){alert(e.message)}};$('addCenterBtn').onclick=()=>addPoint(map.getCenter());$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('toggleClickBtn').classList.toggle('activeBtn',clickAdd);refresh()};map.on('click',e=>{if(clickAdd)addPoint(e.latlng)});$('undoBtn').onclick=()=>{points.pop();refresh()};$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];selectedIndex=-1;refresh()}};$('reverseBtn').onclick=()=>{points.reverse();refresh()};$('copyCoordsBtn').onclick=()=>copyText($('coordsOut').value);$('sendToGenBtn').onclick=()=>{$('genCoords').value=$('coordsOut').value;document.querySelector('[data-tab="genTab"]').click();toast('已送到生成器')};$('pasteMapBtn').onclick=()=>{$('genCoords').value=$('coordsOut').value};$('copyGenCoordsBtn').onclick=()=>copyText($('genCoords').value);
$('toggleOffsetMode').onclick=()=>{offsetAllMode=!offsetAllMode;$('toggleOffsetMode').textContent=offsetAllMode?'全點補正':'單點補正';refresh()};function offsetSelectedOrAll(x,y){const step=Number($('pointOffsetStep').value)||1;const mv=p=>{let ll=L.latLng(p.lat,p.lng);if(y>0)ll=destination(ll,step,0);if(y<0)ll=destination(ll,step,180);if(x>0)ll=destination(ll,step,90);if(x<0)ll=destination(ll,step,270);p.lat=ll.lat;p.lng=ll.lng};if(offsetAllMode)points.forEach(mv);else{if(selectedIndex<0||!points[selectedIndex]){alert('請先點選點位');return}mv(points[selectedIndex])}refresh()}
function parseCoords(txt){return txt.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(line=>{const m=line.match(/(-?\d+(?:\.\d+)?)\s*[,\s]\s*(-?\d+(?:\.\d+)?)/);return m?{lat:+m[1],lng:+m[2]}:null}).filter(Boolean)}
function dedupe(arr){const seen=new Set(),out=[];arr.forEach(p=>{const k=`${p.lat.toFixed(7)},${p.lng.toFixed(7)}`;if(!seen.has(k)){seen.add(k);out.push(p)}});return out}
function centroid(arr){return{lat:arr.reduce((s,p)=>s+p.lat,0)/arr.length,lng:arr.reduce((s,p)=>s+p.lng,0)/arr.length}}
function pathDist(arr){let d=0;for(let i=1;i<arr.length;i++)d+=hav(arr[i-1],arr[i]);return d}
function nearest(arr,start=null){if(arr.length<2)return arr.slice();const rem=arr.slice(),out=[];let cur=start||rem.shift();if(!start)out.push(cur);while(rem.length){let bi=0,bd=1e99;rem.forEach((p,i)=>{const d=hav(cur,p);if(d<bd){bd=d;bi=i}});cur=rem.splice(bi,1)[0];out.push(cur)}return out}
function twoOpt(arr){let best=arr.slice(),im=true,guard=0;while(im&&guard++<80){im=false;for(let i=1;i<best.length-2;i++)for(let k=i+1;k<best.length-1;k++){const n=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));if(pathDist(n)+.1<pathDist(best)){best=n;im=true}}}return best}
function offsetPoint(p,m,deg){const ll=destination(L.latLng(p.lat,p.lng),m,deg);return{lat:+ll.lat.toFixed(7),lng:+ll.lng.toFixed(7)}}
function circlePts(c,r,entry,totalSteps,degStep,dir){const pts=[];for(let i=0;i<=totalSteps;i++)pts.push(offsetPoint(c,r,entry+dir*i*degStep));return pts}
function bestDir(c,r,entry,totalSteps,degStep,next){let bd=1e99,bdir=1;[1,-1].forEach(dir=>{const last=offsetPoint(c,r,entry+dir*totalSteps*degStep);const d=hav(last,next);if(d<bd){bd=d;bdir=dir}});return bdir}
function orderCenters(centers){let a=centers.slice();if($('sortMode').value==='auto')a=twoOpt(nearest(a));if($('direction').value==='reverse')a.reverse();return a}
function finishPath(pts,centers){const end=$('endMode').value;if(!centers.length)return pts;if(end==='start')pts.push({...centers[0]});if(end==='centroid')pts.push(centroid(centers));return pts}
function buildFruit(centers){let c=orderCenters(centers);return finishPath(c.slice(),c)}
function buildFlower(centers){let sorted=orderCenters(centers),cen=centroid(sorted),r=+$('outerR').value||30,steps=+$('stepsLap').value||8,laps=+$('laps').value||1,buffer=+$('bufferM').value||90,deg=360/steps,total=Math.ceil(steps*laps),pts=[];if(!sorted.length)return pts;if(sorted.length===1){pts.push(offsetPoint(sorted[0],buffer,0));pts=pts.concat(circlePts(sorted[0],r,0,total,deg,1));return finishPath(pts,sorted)}const c0=sorted[0],c1=sorted[1],entryBearing=brg(c1,c0),buf=offsetPoint(c0,buffer,entryBearing);pts.push(buf);let entry=brg(buf,c0),dir=bestDir(c0,r,entry,total,deg,c1),circ=circlePts(c0,r,entry,total,deg,dir);pts=pts.concat(circ);let prev=circ[circ.length-1];for(let i=1;i<sorted.length;i++){const c=sorted[i],next=sorted[i+1]||cen;entry=brg(prev,c);dir=bestDir(c,r,entry,total,deg,next);circ=circlePts(c,r,entry,total,deg,dir);pts=pts.concat(circ);prev=circ[circ.length-1]}return finishPath(pts,sorted)}
function buildScan(centers){let margin=+$('scanMargin').value||45,spacing=+$('scanSpacing').value||32;if(!centers.length)return[];let minLat=Math.min(...centers.map(p=>p.lat)),maxLat=Math.max(...centers.map(p=>p.lat)),minLng=Math.min(...centers.map(p=>p.lng)),maxLng=Math.max(...centers.map(p=>p.lng));let mid=centroid(centers),south=destination(L.latLng(minLat,mid.lng),margin,180).lat,north=destination(L.latLng(maxLat,mid.lng),margin,0).lat,west=destination(L.latLng(mid.lat,minLng),margin,270).lng,east=destination(L.latLng(mid.lat,maxLng),margin,90).lng;let latStep=spacing/111132,pts=[],leftToRight=true;for(let lat=south;lat<=north+latStep/2;lat+=latStep){let a={lat,lng:west},b={lat,lng:east};if(leftToRight)pts.push(a,b);else pts.push(b,a);leftToRight=!leftToRight}if($('direction').value==='reverse')pts.reverse();return finishPath(pts,centers)}
function analyzeWarnings(mode,centers,pts){const w=[],speed=(+$('speedKmh').value||12)*1000/3600,dist=pathDist(pts),time=dist/speed;if(mode==='flower'&&+$('laps').value>1&&time/+$('laps').value<300)w.push(`⚠ 單圈預估 ${(time/+$('laps').value/60).toFixed(1)} 分，低於 5 分鐘冷卻，第二圈可能無效。`);if(mode==='scan'&&+$('scanSpacing').value<25)w.push('⚠ 掃描線距低於 25m，可能重複覆蓋。');let ns=0;for(let i=1;i<pts.length;i++){let b=brg(pts[i-1],pts[i]);if(b<30||b>330||(b>150&&b<210))ns++}if(pts.length>2&&ns/(pts.length-1)>.6)w.push('⚠ 南北向路段比例偏高，種花效率可能低於東西向。');return{dist,time,w}}
function buildGpx(pts,fmt){const creator=fmt==='itools'?'iTools GPX Export':fmt==='anyto'?'AnyTo GPX Export':'GPX Tool v7';let s=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="${creator}" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${esc($('fileName').value||'pikmin_route')}</name></metadata>\n`;pts.forEach((p,i)=>{const nm=fmt==='itools'?`iTools_${i+1}`:fmt==='anyto'?`AnyTo_${i+1}`:`P${i+1}`;s+=`<wpt lat="${fmt(p.lat,7)}" lon="${fmt(p.lng,7)}"><name>${nm}</name></wpt>\n`});return s+'</gpx>\n'}
function drawPreview(centers,pts){const cv=$('preview'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#071225';ctx.fillRect(0,0,W,H);const all=centers.concat(pts);if(!all.length){ctx.fillStyle='#9bcda6';ctx.fillText('尚未生成',30,40);return}let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;all.forEach(p=>{minLat=Math.min(minLat,p.lat);maxLat=Math.max(maxLat,p.lat);minLng=Math.min(minLng,p.lng);maxLng=Math.max(maxLng,p.lng)});const pad=35, sx=(W-pad*2)/Math.max(maxLng-minLng,.0002), sy=(H-pad*2)/Math.max(maxLat-minLat,.0002), sc=Math.min(sx,sy);const pr=p=>({x:pad+(p.lng-minLng)*sc,y:H-(pad+(p.lat-minLat)*sc)});ctx.strokeStyle='#69a7ff';ctx.lineWidth=2;ctx.beginPath();pts.forEach((p,i)=>{let q=pr(p);if(i)ctx.lineTo(q.x,q.y);else ctx.moveTo(q.x,q.y)});ctx.stroke();pts.forEach((p,i)=>{if(i%Math.ceil(pts.length/160||1))return;let q=pr(p);ctx.fillStyle='#7ee787';ctx.beginPath();ctx.arc(q.x,q.y,3,0,Math.PI*2);ctx.fill()});centers.forEach((p,i)=>{let q=pr(p);ctx.fillStyle='#ffcc66';ctx.beginPath();ctx.arc(q.x,q.y,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillText('C'+(i+1),q.x+6,q.y+4)})}
function generate(){let centers=parseCoords($('genCoords').value);if($('dedupe').value==='yes')centers=dedupe(centers);if(!centers.length){alert('請輸入座標');return}let mode=$('genMode').value,pts=mode==='fruit'?buildFruit(centers):mode==='scan'?buildScan(centers):buildFlower(centers);const a=analyzeWarnings(mode,centers,pts),gpx=buildGpx(pts,$('outFormat').value);latest={pts,gpx,centers,dist:a.dist,warnings:a.w};$('statIn').textContent=`輸入 ${centers.length}`;$('statOut').textContent=`輸出 ${pts.length}`;$('statDist').textContent=`距離 ${a.dist>=1000?(a.dist/1000).toFixed(2)+'km':Math.round(a.dist)+'m'}`;$('statTime').textContent=`時間 ${Math.round(a.time/60)}分`;$('warnBox').style.display=a.w.length?'block':'none';$('warnBox').className='status warn';$('warnBox').textContent=a.w.join('\n');$('gpxOut').value=gpx;$('routeList').textContent=pts.map(p=>`${fmt(p.lat,7)},${fmt(p.lng,7)}`).join('\n');drawPreview(centers,pts);toast('已生成')}
$('generateBtn').onclick=generate;$('downloadBtn').onclick=()=>{if(!latest.gpx)generate();if(!latest.gpx)return;let name=($('fileName').value||'pikmin_route').replace(/[\\/:*?"<>|]/g,'_');if($('outFormat').value!=='standard')name+='_'+$('outFormat').value;if(!name.endsWith('.gpx'))name+='.gpx';const blob=new Blob([latest.gpx],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),800)};$('copyGpxBtn').onclick=()=>copyText($('gpxOut').value);$('copyRouteBtn').onclick=()=>copyText($('routeList').textContent);refresh();drawPreview([],[]);
</script>
